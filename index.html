<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>All We Are Impact Map</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body{
margin:0;
padding:0;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* Map style button */
#styleToggle{
position:absolute;
right:16px;
bottom:138px;
z-index:10;

width:56px;
height:56px;

border:2px solid rgba(255,255,255,0.85);
border-radius:10px;

background:rgba(92,88,72,0.92);

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:0 4px 14px rgba(0,0,0,0.3);
}

#styleToggle:hover{
background:rgba(108,104,86,0.96);
}

#styleToggle svg{
width:28px;
height:28px;
}

/* Zoom control placement */

.mapboxgl-ctrl-bottom-right{
right:16px;
bottom:16px;
}

.mapboxgl-ctrl-top-right{
display:none;
}

.mapboxgl-ctrl-bottom-right .mapboxgl-ctrl{
margin:0 !important;
}

/* Zoom button styling */

.mapboxgl-ctrl-group{
border-radius:10px !important;
overflow:hidden;
box-shadow:0 4px 14px rgba(0,0,0,0.3) !important;
border:1px solid rgba(0,0,0,0.08);
}

.mapboxgl-ctrl-group button{
width:56px !important;
height:56px !important;
background:#ffffff !important;
}

.mapboxgl-ctrl-group button + button{
border-top:1px solid #e5e5e5 !important;
}

/* Attribution position */

.mapboxgl-ctrl-bottom-left{
left:auto !important;
right:16px !important;
bottom:-4px !important;
}

.mapboxgl-ctrl-bottom-left .mapboxgl-ctrl{
margin:0 !important;
}

.mapboxgl-ctrl-attrib{
font-size:11px !important;
background:rgba(255,255,255,0.85) !important;
border-radius:4px 4px 0 0 !important;
}

/* Popup styling */

.mapboxgl-popup{
max-width:560px;
}

.mapboxgl-popup-content{
padding:0;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
font-family:Arial,sans-serif;
}

.mapboxgl-popup-close-button{
font-size:24px;
color:#666;
padding:8px 12px;
}

.popup-card{
background:#ffffff;
color:#333333;
padding:22px 26px;
min-width:420px;
max-width:520px;
}

.popup-title{
font-size:24px;
font-weight:500;
line-height:1.15;
margin:0 36px 12px 0;
white-space:normal;
overflow-wrap:break-word;
}

.popup-meta-row{
display:flex;
flex-wrap:wrap;
gap:18px;
align-items:center;
font-size:18px;
color:#666666;
margin-bottom:14px;
}

.popup-meta-item{
display:flex;
align-items:center;
gap:8px;
}

.popup-icon{
width:18px;
height:18px;
}

.popup-details{
font-size:15px;
line-height:1.6;
color:#555555;
}

.popup-details strong{
color:#333333;
}

</style>
</head>

<body>

<button id="styleToggle">
<svg viewBox="0 0 24 24" fill="none">
<path d="M12 3L4 7L12 11L20 7L12 3Z" stroke="white" stroke-width="1.8"/>
<path d="M4 12L12 16L20 12" stroke="white" stroke-width="1.8"/>
<path d="M4 16.5L12 20.5L20 16.5" stroke="white" stroke-width="1.8"/>
</svg>
</button>

<div id="map"></div>

<script>

mapboxgl.accessToken='pk.eyJ1Ijoicy1wZXJrIiwiYSI6ImNtbWU1amJyZDBiNjcyc3E0bmZubXVwdm8ifQ.-II8pwN1aLKbed_BQXf0cA';

let currentStyle='dark';

const styles={
dark:'mapbox://styles/mapbox/dark-v11',
real:'mapbox://styles/mapbox/satellite-streets-v12'
};

function parseNumber(v){
if(v===undefined||v===null)return 0;
return Number(String(v).replace(/,/g,'').trim())||0;
}

function escapeHtml(str){
return String(str??'')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#39;');
}

const map=new mapboxgl.Map({
container:'map',
style:styles.dark,
center:[32.3,0.3],
zoom:5
});

map.addControl(
new mapboxgl.NavigationControl({
showCompass:false,
visualizePitch:false
}),
'bottom-right'
);

function bindMapInteractions(){

map.on('click','clusters',(e)=>{

const features=map.queryRenderedFeatures(e.point,{layers:['clusters']});
if(!features.length)return;

const clusterId=features[0].properties.cluster_id;

map.getSource('sites').getClusterExpansionZoom(clusterId,(err,zoom)=>{
if(err)return;

map.easeTo({
center:features[0].geometry.coordinates,
zoom:zoom
});

});

});

map.on('click','points',(e)=>{

const props=e.features[0].properties;
const coords=e.features[0].geometry.coordinates.slice();
const population=parseNumber(props.Population);

const popupHtml=`
<div class="popup-card">

<div class="popup-title">${escapeHtml(props.name||'Site')}</div>

<div class="popup-meta-row">
<div class="popup-meta-item">✓ ${escapeHtml(props.installDate||'No install date')}</div>
<div class="popup-meta-item">👤 ${population.toLocaleString()}</div>
</div>

<div class="popup-details">
<div><strong>System:</strong> ${escapeHtml(props.systemName||props.designType||'N/A')}</div>
<div><strong>System number:</strong> ${escapeHtml(props.systemNumber||'N/A')}</div>
<div><strong>Type:</strong> ${escapeHtml(props.customerType||'N/A')}</div>
<div><strong>District:</strong> ${escapeHtml(props.district||'N/A')}</div>
<div><strong>Customer ID:</strong> ${escapeHtml(props.customerId||'N/A')}</div>
</div>

</div>
`;

new mapboxgl.Popup({
offset:18,
maxWidth:'520px'
})
.setLngLat(coords)
.setHTML(popupHtml)
.addTo(map);

});

map.on('mouseenter','clusters',()=>{map.getCanvas().style.cursor='pointer';});
map.on('mouseleave','clusters',()=>{map.getCanvas().style.cursor='';});

map.on('mouseenter','points',()=>{map.getCanvas().style.cursor='pointer';});
map.on('mouseleave','points',()=>{map.getCanvas().style.cursor='';});

}

function addSiteLayers(){

d3.csv('./Impact_Map_Export%20-%20Sheet1.csv').then(function(data){

const features=data
.filter(d=>d.longitude&&d.latitude)
.map(d=>({
type:'Feature',
properties:{
Population:parseNumber(d['Population']),
name:d['Customer Name']||'',
district:d['District']||'',
customerId:d['Customer ID']||'',
customerType:d['Customer Type']||'',
installDate:d['Install Date']||'',
systemName:d['System Name']||'',
designType:d['Design Type']||'',
systemNumber:d['Customer System Number']||''
},
geometry:{
type:'Point',
coordinates:[parseNumber(d.longitude),parseNumber(d.latitude)]
}
}));

const geojson={
type:'FeatureCollection',
features:features
};

map.addSource('sites',{
type:'geojson',
data:geojson,
cluster:true,
clusterRadius:150,
clusterMaxZoom:13,
clusterProperties:{
people:['+',['get','Population']]
}
});

map.addLayer({
id:'clusters',
type:'circle',
source:'sites',
filter:['has','point_count'],
paint:{
'circle-color':'#E3BC47',
'circle-stroke-color':'#ffffff',
'circle-stroke-width':2,
'circle-radius':[
'interpolate',['linear'],['get','people'],
0,18,
1000,26,
5000,36,
10000,46,
25000,60
]
}
});

map.addLayer({
id:'cluster-count',
type:'symbol',
source:'sites',
filter:['has','point_count'],
layout:{
'text-field':['to-string',['get','people']],
'text-size':18
},
paint:{
'text-color':'#000'
}
});

map.addLayer({
id:'points',
type:'circle',
source:'sites',
filter:['!',['has','point_count']],
paint:{
'circle-color':'#E3BC47',
'circle-radius':[
'interpolate',['linear'],['get','Population'],
0,5,
100,8,
300,12,
600,16,
1000,20
],
'circle-stroke-color':'#fff',
'circle-stroke-width':2
}
});

bindMapInteractions();

});

}

map.on('load',()=>{
addSiteLayers();
});

document.getElementById('styleToggle').onclick=()=>{

const center=map.getCenter();
const zoom=map.getZoom();
const bearing=map.getBearing();
const pitch=map.getPitch();

currentStyle=currentStyle==='dark'?'real':'dark';

map.setStyle(styles[currentStyle]);

map.once('style.load',()=>{
map.jumpTo({center,zoom,bearing,pitch});
addSiteLayers();
});

};

</script>

</body>
</html>
