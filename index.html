<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<title>All We Are Impact Map</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{
margin:0;
padding:0;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* DARK dropdown */

#customerSelectorWrap{
position:absolute;
top:16px;
left:16px;
z-index:20;
background:rgba(32,32,32,0.96);
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 4px 14px rgba(0,0,0,0.35);
padding:10px 12px;
min-width:280px;
}

#customerSelectorLabel{
display:block;
font-family:Arial,sans-serif;
font-size:13px;
font-weight:600;
color:#eeeeee;
margin-bottom:6px;
}

#customerSelector{
width:100%;
font-size:15px;
padding:10px 12px;
border:1px solid rgba(255,255,255,0.12);
border-radius:8px;
background:#2b2b2b;
color:#f5f5f5;
outline:none;
}

#customerSelector option{
background:#2b2b2b;
color:#f5f5f5;
}

/* style toggle button */

#customControls{
position:absolute;
right:16px;
bottom:140px;
z-index:10;
pointer-events:none;
}

#styleToggle{
width:56px;
height:56px;
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
background:rgba(43,43,43,0.95);
color:white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 14px rgba(0,0,0,0.35);
padding:0;
pointer-events:auto;
}

#styleToggle:hover{
background:rgba(58,58,58,0.98);
}

#styleToggle svg{
width:28px;
height:28px;
}

/* DARK zoom buttons */

.mapboxgl-ctrl-bottom-right{
right:16px;
bottom:16px;
}

.mapboxgl-ctrl-bottom-right .mapboxgl-ctrl{
margin:0!important;
}

.mapboxgl-ctrl-group{
border-radius:10px!important;
overflow:hidden;
box-shadow:0 4px 14px rgba(0,0,0,0.35)!important;
border:1px solid rgba(255,255,255,0.08);
background:#2b2b2b!important;
}

.mapboxgl-ctrl-group button{
width:56px!important;
height:56px!important;
background:#2b2b2b!important;
}

.mapboxgl-ctrl-group button+button{
border-top:1px solid rgba(255,255,255,0.08)!important;
}

.mapboxgl-ctrl-group button span{
filter:invert(1) brightness(1.6);
}

/* popup styling unchanged */

.mapboxgl-popup{
max-width:560px;
}

.mapboxgl-popup-content{
position:relative;
padding:0;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
font-family:Arial,sans-serif;
}

.mapboxgl-popup-close-button{
position:absolute;
top:8px;
right:8px;
z-index:20;
width:32px;
height:32px;
line-height:28px;
font-size:28px;
color:#666;
background:transparent;
border:none;
cursor:pointer;
padding:0;
pointer-events:auto;
}

.popup-card{
background:#ffffff;
padding:22px 24px;
min-width:380px;
}

.popup-title{
font-size:28px;
font-weight:500;
line-height:1.12;
margin:0 36px 14px 0;
word-break:break-word;
}

.popup-meta-row{
display:flex;
flex-wrap:wrap;
gap:18px;
align-items:center;
font-size:20px;
color:#6b6b6b;
margin-bottom:14px;
}

.popup-meta-item{
display:flex;
align-items:center;
gap:8px;
}

.popup-icon{
width:18px;
height:18px;
}

.popup-details{
font-size:16px;
line-height:1.55;
color:#555555;
}

.popup-details strong{
color:#333333;
}
</style>
</head>

<body>

<div id="customerSelectorWrap">
<label id="customerSelectorLabel" for="customerSelector">Jump to customer</label>
<select id="customerSelector">
<option value="">Select a customer...</option>
</select>
</div>

<div id="customControls">
<button id="styleToggle" aria-label="Switch map style" title="Switch map style">
<svg viewBox="0 0 24 24" fill="none">
<path d="M12 3L4 7L12 11L20 7L12 3Z" stroke="white" stroke-width="1.8"/>
<path d="M4 12L12 16L20 12" stroke="white" stroke-width="1.8"/>
<path d="M4 16.5L12 20.5L20 16.5" stroke="white" stroke-width="1.8"/>
</svg>
</button>
</div>

<div id="map"></div>

<script>
/* your entire original script continues exactly unchanged */
</script>

</body>
</html>
